<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maestra Slot Monitor</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0f; color:#e0e0e0; font-family:'SF Mono','Fira Code',monospace; padding:20px; }
h1 { text-align:center; font-size:1.2rem; letter-spacing:4px; color:#888; margin-bottom:24px; text-transform:uppercase; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; max-width:1200px; margin:0 auto; }
.slot { background:#111118; border:1px solid #222; border-radius:12px; overflow:hidden; }
.slot.locked { border-color:#2a6; }
.slot.offline { border-color:#633; opacity:0.7; }
</style>
</head>
<body>
<h1>Maestra Slot Monitor</h1>
<div class="grid" id="grid"></div>
</body>
</html>
<style>
.slot-header { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; background:#16161e; }
.slot-name { font-size:1.1rem; font-weight:bold; }
.slot-badges { display:flex; gap:6px; }
.badge { font-size:0.65rem; padding:2px 8px; border-radius:10px; text-transform:uppercase; letter-spacing:1px; }
.badge-locked { background:#1a3a2a; color:#4f8; }
.badge-live { background:#3a1a1a; color:#f84; animation:pulse 2s infinite; }
.badge-offline { background:#222; color:#666; }
.badge-visitor { background:#1a2a3a; color:#4af; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.frame-wrap { position:relative; width:100%; padding-top:56.25%; background:#000; }
.frame-wrap img { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; }
.frame-wrap .no-frame { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#444; font-size:0.8rem; }
.stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:12px 16px; }
.stat { background:#0d0d14; padding:8px 12px; border-radius:8px; }
.stat-label { font-size:0.6rem; color:#666; text-transform:uppercase; letter-spacing:1px; margin-bottom:2px; }
.stat-value { font-size:0.95rem; color:#ccc; }
.stat-value.fps { color:#4f8; font-weight:bold; }
.prompt-bar { padding:8px 16px 12px; }
.prompt-label { font-size:0.6rem; color:#666; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
.prompt-text { font-size:0.85rem; color:#a8f; min-height:1.2em; font-style:italic; word-break:break-word; }
</style>
<script>
const BASE = window.location.origin;
const SLOTS = ['td_operator', 'slot2'];
const REFRESH_MS = 2000;
const FRAME_REFRESH_MS = 500;

function createSlotCard(slotId) {
  const el = document.createElement('div');
  el.className = 'slot offline';
  el.id = 'slot-' + slotId;
  el.innerHTML = `
    <div class="slot-header">
      <span class="slot-name">${slotId}</span>
      <div class="slot-badges" id="badges-${slotId}">
        <span class="badge badge-offline">offline</span>
      </div>
    </div>
    <div class="frame-wrap">
      <img id="frame-${slotId}" style="display:none" />
      <div class="no-frame" id="noframe-${slotId}">no frame data</div>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Frame Rate</div>
        <div class="stat-value fps" id="fps-${slotId}">-- fps</div>
      </div>
      <div class="stat">
        <div class="stat-label">Device</div>
        <div class="stat-value" id="device-${slotId}">--</div>
      </div>
      <div class="stat">
        <div class="stat-label">Visitor</div>
        <div class="stat-value" id="visitor-${slotId}">--</div>
      </div>
      <div class="stat">
        <div class="stat-label">Lock</div>
        <div class="stat-value" id="lock-${slotId}">--</div>
      </div>
    </div>
    <div class="prompt-bar">
      <div class="prompt-label">Current Prompt</div>
      <div class="prompt-text" id="prompt-${slotId}">waiting...</div>
    </div>
  `;
  return el;
}
</script>
<script>
const grid = document.getElementById('grid');
SLOTS.forEach(id => grid.appendChild(createSlotCard(id)));

let locks = {};

async function fetchLocks() {
  try {
    const r = await fetch(BASE + '/video/locks');
    locks = await r.json();
  } catch(e) { locks = {}; }
}

async function fetchState(slotId) {
  try {
    const r = await fetch(BASE + '/entities');
    const entities = await r.json();
    const entity = entities.find(e => e.id === slotId || e.slug === slotId);
    if (!entity) return null;
    return entity;
  } catch(e) { return null; }
}

function updateSlot(slotId, entity) {
  const card = document.getElementById('slot-' + slotId);
  const badges = document.getElementById('badges-' + slotId);
  const state = entity?.state || {};
  const isLocked = !!locks[slotId];
  const isActive = entity?.status === 'active';
  const hasVisitor = state.visitor_present;

  card.className = 'slot' + (isLocked ? ' locked' : '') + (!isActive ? ' offline' : '');

  let badgeHtml = '';
  if (isActive) badgeHtml += '<span class="badge badge-live">live</span>';
  else badgeHtml += '<span class="badge badge-offline">offline</span>';
  if (isLocked) badgeHtml += '<span class="badge badge-locked">locked</span>';
  if (hasVisitor) badgeHtml += '<span class="badge badge-visitor">visitor</span>';
  badges.innerHTML = badgeHtml;

  document.getElementById('fps-' + slotId).textContent =
    state.fps != null ? state.fps.toFixed(1) + ' fps' : '-- fps';
  document.getElementById('device-' + slotId).textContent =
    state.device || locks[slotId]?.locked_by || '--';
  document.getElementById('visitor-' + slotId).textContent =
    hasVisitor ? 'YES' : 'no';
  document.getElementById('lock-' + slotId).textContent =
    isLocked ? locks[slotId].token_prefix : 'unlocked';
  document.getElementById('prompt-' + slotId).textContent =
    state.prompt_text || 'waiting...';
}

function refreshFrame(slotId) {
  const img = document.getElementById('frame-' + slotId);
  const noframe = document.getElementById('noframe-' + slotId);
  const url = BASE + '/video/frame/' + slotId + '?t=' + Date.now();
  const testImg = new Image();
  testImg.onload = () => {
    img.src = testImg.src;
    img.style.display = 'block';
    noframe.style.display = 'none';
  };
  testImg.onerror = () => {
    img.style.display = 'none';
    noframe.style.display = 'block';
  };
  testImg.src = url;
}

async function poll() {
  await fetchLocks();
  for (const slotId of SLOTS) {
    const entity = await fetchState(slotId);
    updateSlot(slotId, entity);
  }
}

poll();
setInterval(poll, REFRESH_MS);
SLOTS.forEach(id => {
  refreshFrame(id);
  setInterval(() => refreshFrame(id), FRAME_REFRESH_MS);
});
</script>
