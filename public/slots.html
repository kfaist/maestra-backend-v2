<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maestra Slot Monitor</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0f; color:#e0e0e0; font-family:'SF Mono','Fira Code',monospace; padding:16px; }
h1 { text-align:center; font-size:1rem; letter-spacing:4px; color:#666; margin-bottom:16px; text-transform:uppercase; }
.grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; max-width:1600px; margin:0 auto; }
.slot { background:#111118; border:1px solid #222; border-radius:10px; overflow:hidden; }
.slot.streaming { border-color:#2a6; }
.slot.offline { border-color:#633; opacity:0.7; }
</style>
</head>
<body>
<h1>Maestra Slot Monitor</h1>
<div class="grid" id="grid"></div>
</body>
</html>
<style>
.slot-header { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; background:#16161e; }
.slot-name { font-size:1rem; font-weight:bold; }
.badges { display:flex; gap:5px; flex-wrap:wrap; }
.badge { font-size:0.55rem; padding:2px 7px; border-radius:8px; text-transform:uppercase; letter-spacing:1px; }
.b-stream { background:#1a3a2a; color:#4f8; animation:pulse 2s infinite; }
.b-offline { background:#222; color:#666; }
.b-visitor { background:#1a2a3a; color:#4af; }
.b-locked { background:#2a1a1a; color:#f66; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
.frame-wrap { position:relative; width:100%; padding-top:56.25%; background:#000; }
.frame-wrap img { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; }
.frame-wrap .no-frame { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#333; font-size:0.7rem; }
</style>
<style>
.chips { display:flex; flex-wrap:wrap; gap:6px; padding:10px 14px; }
.chip { display:flex; align-items:center; gap:5px; background:#0d0d14; padding:5px 10px; border-radius:6px; border-left:3px solid #444; }
.chip-label { font-size:0.55rem; color:#666; text-transform:uppercase; letter-spacing:0.5px; }
.chip-val { font-size:0.8rem; color:#ccc; }
.chip-fps { border-color:#22c55e; }
.chip-fps .chip-val { color:#4ade80; font-weight:bold; }
.chip-prompt { border-color:#a855f7; flex:1 1 100%; }
.chip-prompt .chip-val { color:#c084fc; font-style:italic; font-size:0.75rem; word-break:break-word; }
.chip-audio { border-color:#f59e0b; }
.chip-audio .chip-val { color:#fbbf24; }
.chip-visitor { border-color:#3b82f6; }
.chip-visitor .chip-val.yes { color:#60a5fa; font-weight:bold; }
.chip-visitor .chip-val.no { color:#555; }
.audio-bar { width:60px; height:8px; background:#1a1a24; border-radius:4px; overflow:hidden; display:inline-block; vertical-align:middle; }
.audio-fill { height:100%; background:linear-gradient(90deg,#f59e0b,#ef4444); border-radius:4px; transition:width 0.3s; }
</style>
<script>
const BASE = window.location.origin;
const SLOTS = ['td_operator', 'slot2', 'slot3'];
const REFRESH_MS = 2000;
const FRAME_MS = 800;

function makeCard(id) {
  const el = document.createElement('div');
  el.className = 'slot offline'; el.id = 's-' + id;
  el.innerHTML = `
    <div class="slot-header">
      <span class="slot-name">${id}</span>
      <div class="badges" id="bg-${id}"><span class="badge b-offline">offline</span></div>
    </div>
    <div class="frame-wrap">
      <img id="img-${id}" style="display:none" />
      <div class="no-frame" id="nf-${id}">no frame</div>
    </div>
    <div class="chips" id="chips-${id}">
      <div class="chip chip-fps"><span class="chip-label">FPS</span><span class="chip-val" id="fps-${id}">--</span></div>
      <div class="chip chip-audio"><span class="chip-label">Audio</span><span class="chip-val" id="aud-${id}">
        <span class="audio-bar"><span class="audio-fill" id="audfill-${id}" style="width:0%"></span></span> 0.0
      </span></div>
      <div class="chip chip-visitor"><span class="chip-label">Visitor</span><span class="chip-val no" id="vis-${id}">--</span></div>
      <div class="chip chip-prompt"><span class="chip-label">Prompt</span><span class="chip-val" id="pr-${id}">waiting...</span></div>
    </div>`;
  return el;
}
const grid = document.getElementById('grid');
SLOTS.forEach(id => grid.appendChild(makeCard(id)));
</script>
<script>
let locks = {};
async function poll() {
  try { locks = await (await fetch(BASE+'/video/locks')).json(); } catch(e) { locks={}; }
  let entities = [];
  try { entities = await (await fetch(BASE+'/entities')).json(); } catch(e) {}

  for (const id of SLOTS) {
    const ent = entities.find(e => e.id === id || e.slug === id);
    const st = ent?.state || {};
    const lock = locks[id];
    const isActive = ent?.status === 'active';

    // Frame freshness check
    let fresh = false;
    try {
      const r = await fetch(BASE+'/video/frame/'+id, {method:'HEAD'});
      const age = parseInt(r.headers.get('X-Frame-Age-Ms') || '999999');
      fresh = age < 10000;
    } catch(e) {}

    const streaming = isActive && fresh;
    const card = document.getElementById('s-'+id);
    card.className = 'slot' + (streaming ? ' streaming' : ' offline');

    // Badges
    let bh = '';
    if (streaming) bh += '<span class="badge b-stream">live</span>';
    else bh += '<span class="badge b-offline">offline</span>';
    if (lock) bh += '<span class="badge b-locked">locked</span>';
    if (st.visitor_present) bh += '<span class="badge b-visitor">visitor</span>';
    document.getElementById('bg-'+id).innerHTML = bh;

    // Chips
    const fps = st.fps != null ? st.fps.toFixed(1) : '--';
    document.getElementById('fps-'+id).textContent = fps + ' fps';

    const amp = st.audio_amplitude != null ? st.audio_amplitude : 0;
    const ampPct = Math.min(100, Math.round(amp * 100));
    document.getElementById('audfill-'+id).style.width = ampPct + '%';
    document.getElementById('aud-'+id).innerHTML =
      '<span class="audio-bar"><span class="audio-fill" id="audfill-'+id+'" style="width:'+ampPct+'%"></span></span> ' + amp.toFixed(2);

    const visEl = document.getElementById('vis-'+id);
    visEl.textContent = st.visitor_present ? 'YES' : 'no';
    visEl.className = 'chip-val ' + (st.visitor_present ? 'yes' : 'no');

    document.getElementById('pr-'+id).textContent = st.prompt_text || 'waiting...';
  }
}

function refreshFrame(id) {
  const img = document.getElementById('img-'+id);
  const nf = document.getElementById('nf-'+id);
  const t = new Image();
  t.onload = () => { img.src=t.src; img.style.display='block'; nf.style.display='none'; };
  t.onerror = () => { img.style.display='none'; nf.style.display='block'; };
  t.src = BASE+'/video/frame/'+id+'?t='+Date.now();
}

poll(); setInterval(poll, REFRESH_MS);
SLOTS.forEach(id => { refreshFrame(id); setInterval(()=>refreshFrame(id), FRAME_MS); });
</script>
